<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progresso 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; padding: 16px; }
  .container { max-width: 420px; margin: 0 auto; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 18px; font-weight: 700; color: #1f2937; }
  .card-sub { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
  .pct-label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; }
  .bar-bg { height: 10px; border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
  .big-pct { text-align: center; font-size: 32px; font-weight: 700; margin-bottom: 16px; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { border-radius: 8px; padding: 10px; text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; color: #374151; }
  .stat-label { font-size: 11px; color: #6b7280; }
  .complete-msg { margin-top: 10px; text-align: center; font-size: 13px; color: #16a34a; font-weight: 500; }

.year .bar-bg { background: #eef2ff; }
.year .bar-fill { background: linear-gradient(90deg, #6366f1, #9333ea); }
.year .big-pct { background: linear-gradient(90deg, #6366f1, #9333ea); }
.year .stat { background: #eef2ff; }

.q2 .bar-bg { background: #ecfdf5; }
.q2 .bar-fill { background: linear-gradient(90deg, #10b981, #0d9488); }
.q2 .big-pct { background: linear-gradient(90deg, #10b981, #0d9488); }
.q2 .stat { background: #ecfdf5; }
</style>

</head>
<body>
<div class="container">
  <div class="card year">
    <div class="card-title">Ano Completo</div>
    <div class="card-sub">Janeiro a Dezembro</div>
    <div class="pct-label" id="y-lbl"></div>
    <div class="bar-bg"><div class="bar-fill" id="y-bar"></div></div>
    <div class="big-pct" id="y-big"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="y-el"></div><div class="stat-label">dias passados</div></div>
      <div class="stat"><div class="stat-num" id="y-rem"></div><div class="stat-label">dias restantes</div></div>
    </div>
    <div class="complete-msg" id="y-done" style="display:none">✓ Período completo!</div>
  </div>

  <div class="card q2">
    <div class="card-title">2º Trimestre</div>
    <div class="card-sub">Abril a Junho</div>
    <div class="pct-label" id="q-lbl"></div>
    <div class="bar-bg"><div class="bar-fill" id="q-bar"></div></div>
    <div class="big-pct" id="q-big"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="q-el"></div><div class="stat-label">dias passados</div></div>
      <div class="stat"><div class="stat-num" id="q-rem"></div><div class="stat-label">dias restantes</div></div>
    </div>
    <div class="complete-msg" id="q-done" style="display:none">✓ Período completo!</div>
  </div>
</div>

<script>
function calc() {
  const now = new Date();
  const yr = now.getFullYear();

  // Year
  const s = new Date(yr,0,1), eY = new Date(yr,11,31,23,59,59);
  const elY = now - s, totY = eY - s;
  const yP = Math.min(elY/totY*100,100);
  const yD = Math.floor(elY/864e5), yT = Math.ceil(totY/864e5)+1;
  document.getElementById('y-lbl').textContent = yP.toFixed(2)+'% completo';
  document.getElementById('y-bar').style.width = yP+'%';
  document.getElementById('y-big').textContent = yP.toFixed(1)+'%';
  document.getElementById('y-el').textContent = yD;
  document.getElementById('y-rem').textContent = Math.max(yT-yD,0);
  document.getElementById('y-done').style.display = yP>=100?'block':'none';

  // Q2
  const sQ = new Date(yr,3,1), eQ = new Date(yr,5,30,23,59,59);
  const elQ = Math.max(now-sQ,0), totQ = eQ-sQ;
  const qP = Math.min(elQ/totQ*100,100);
  const qD = Math.max(Math.floor(elQ/864e5),0), qT = Math.ceil(totQ/864e5)+1;
  document.getElementById('q-lbl').textContent = qP.toFixed(2)+'% completo';
  document.getElementById('q-bar').style.width = Math.min(qP,100)+'%';
  document.getElementById('q-big').textContent = qP.toFixed(1)+'%';
  document.getElementById('q-el').textContent = Math.min(qD,qT);
  document.getElementById('q-rem').textContent = Math.max(qT-qD,0);
  document.getElementById('q-done').style.display = qP>=100?'block':'none';
}
calc();
setInterval(calc,60000);
</script>

</body>
</html>
